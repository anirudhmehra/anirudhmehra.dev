media:
  input: public/uploads
  output: /uploads

settings:
  content:
    merge: true

content:
  - name: posts
    label: Posts
    type: collection
    path: src/data/blog
    filename: "{primary}.md"
    view:
      fields: [title, pubDatetime, featured, draft]
      primary: title
      sort: [pubDatetime, title]
      default:
        sort: pubDatetime
        order: desc
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: description
        label: Description
        type: text
        required: true
      - name: pubDatetime
        label: Published
        type: date
        required: true
      - name: modDatetime
        label: Updated
        type: date
      - name: author
        label: Author
        type: string
        default: Anirudh Mehra
      - name: featured
        label: Featured
        type: boolean
        default: false
      - name: draft
        label: Draft
        type: boolean
        default: false
      - name: tags
        label: Tags
        type: string
        list:
          min: 1
          collapsible: false
      - name: ogImage
        label: OG Image
        type: string
        description: Local path or absolute URL for the social image.
      - name: canonicalURL
        label: Canonical URL
        type: string
      - name: hideEditPost
        label: Hide edit link
        type: boolean
        default: false
      - name: timezone
        label: Timezone
        type: string
        default: Asia/Kolkata
      - name: body
        label: Body
        type: text
        required: true
  - name: about
    label: About Page
    type: file
    path: src/pages/about.md
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: body
        label: Body
        type: text
        required: true
