version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    cooldown:
      semver-patch-days: 7
      semver-minor-days: 7
      semver-major-days: 14
    open-pull-requests-limit: 5
    assignees:
      - "anirudhmehra"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
    groups:
      astro:
        patterns:
          - "astro"
          - "@astrojs/*"
      tooling:
        patterns:
          - "eslint*"
          - "@typescript-eslint/*"
          - "typescript-eslint"
          - "prettier"
          - "prettier-plugin-*"
      styling:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:15"
      timezone: "Asia/Kolkata"
    cooldown:
      default-days: 14
    open-pull-requests-limit: 3
    assignees:
      - "anirudhmehra"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
